spring:
  application:
    name: api.banco
  
  datasource:
    url: jdbc:postgresql://db.refymvcvmdppdjzlnqhx.supabase.co:5432/postgres
    username: postgres
    password: ${DB_PASSWORD} 
    driver-class-name: org.postgresql.Driver
  
    hikari:
      maximum-pool-size: 10 
      minimum-idle: 5       
      idle-timeout: 300000 
      connection-timeout: 20000 
      max-lifetime: 1200000 

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect